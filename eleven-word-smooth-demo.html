      let gain = 1;
      if (i < fadeN && pos) gain = i / fadeN;
      if (i > a.length - fadeN) gain = Math.min(gain, (a.length-i)/fadeN);
      ch[j] += a[i] * gain;
    }
    pos += a.length - fadeN;
  }
  const src = ac.createBufferSource(); src.buffer = out; src.connect(ac.destination); src.start();
}
document.getElementById('play').onclick = play;
</script>
