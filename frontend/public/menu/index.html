<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Portfolio HUD — Tech Pipeline v3 Advanced</title>

<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>

<style>
  :root {
    --bg: #040508;
    --ink: rgba(240, 245, 255, 0.9);
    --ink-sub: rgba(240, 245, 255, 0.65);
    --ink-header: #ffffff;
    --edge: rgba(220, 225, 235, 0.25);
    --edge-light: rgba(220, 225, 235, 0.5);
    --accent: #89f5ff;
    --accent-glow: rgba(137, 245, 255, 0.25);
    --status-online: #33ff99;
    --status-active: #89f5ff;
    --status-standby: #607090;
  }

  /* --- MEJORA: TEMAS POR TECNOLOGÍA --- */
  .card[data-id="react"] { --accent: #61dafb; --accent-glow: rgba(97,218,251,.25); }
  .card[data-id="javascript"] { --accent: #f7df1e; --accent-glow: rgba(247,223,30,.2); }
  .card[data-id="python"] { --accent: #3572A5; --accent-glow: rgba(53,114,165,.25); }
  .card[data-id="nodejs"] { --accent: #68A063; --accent-glow: rgba(104,160,99,.25); }
  .card[data-id="html5"] { --accent: #E34F26; --accent-glow: rgba(227,79,38,.25); }
  .card[data-id="css3"] { --accent: #1572B6; --accent-glow: rgba(21,114,182,.25); }
  .card[data-id="aws"] { --accent: #FF9900; --accent-glow: rgba(255,153,0,.25); }
  .card[data-id="docker"] { --accent: #2496ED; --accent-glow: rgba(36,150,237,.25); }

  * { box-sizing: border-box; user-select: none; outline-offset: 4px; scrollbar-width: none; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  *:focus-visible { outline: 2px solid var(--accent); }

  html, body {
    height: 100%; margin: 0;
    background: var(--bg); color: var(--ink);
    font-family: Ubuntu, Arial, sans-serif;
    overflow: hidden; cursor: default;
  }

  /* --- Escena y Tarjetas --- */
  .environment-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .floor-grid {
    position: absolute; width: 200%; height: 200%; left: -50%; top: -50%;
    transform: rotateX(90deg) translateZ(-280px);
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: flow 25s linear infinite;
  }
  @keyframes flow { from { background-position: 0 0; } to { background-position: -600px 0; } }

  .viewport { position: fixed; inset: 0; display: grid; place-items: center; perspective: 1500px; perspective-origin: 50% 45%; z-index: 1; }
  .scene { position: relative; top: 70px; width: min(1400px, 95vw); height: min(700px, 80vh); transform-style: preserve-3d; transform: rotateX(25deg) rotateY(-20deg); will-change: transform; }
  .pipeline { position: absolute; inset: 0; transform-style: preserve-3d; will-change: transform; }

  .card {
    position: absolute; width: 280px; height: 400px;
    background: rgba(15, 18, 25, 0.3); backdrop-filter: blur(12px);
    border-radius: 12px; border: 1px solid var(--edge);
    transform-style: preserve-3d; transition: transform 0.4s ease-out, opacity 0.4s ease, filter 0.4s ease, border-color 0.4s ease;
    cursor: pointer; overflow: hidden; will-change: transform, opacity, filter;
  }
  .card-fader { opacity: 0; }

  .scene:not(.is-card-hovered) .card:not(.is-active),
  .scene.is-card-hovered .card:not(:hover):not(.is-active) { opacity: 0.15; filter: blur(2px) saturate(0.5); }
  .scene.is-panel-open .card:not(.is-active) { opacity: 0.08; filter: blur(4px) saturate(0); }
  
  /* --- MEJORA: TILT MAGNÉTICO --- */
  .card:hover { 
    transform: translateY(-15px) translateZ(30px) scale(1.05) rotateX(var(--tilt-y, 0)) rotateY(var(--tilt-x, 0)); 
    z-index: 100; 
  }
  .card.is-active { z-index: 50; }

  .card.is-active::before {
    content: ""; position: absolute; inset: -2px; border-radius: 14px;
    background: linear-gradient(45deg, var(--accent), transparent, var(--accent));
    background-size: 200% 200%;
    animation: pulse-glow 2s ease-in-out infinite; z-index: -1;
  }
  
  @keyframes pulse-glow {
    0%, 100% { background-position: 0% 50%; opacity: 0.3; }
    50% { background-position: 100% 50%; opacity: 0.6; }
  }

  /* --- MEJORA: PULSO SINCRONIZADO CON STATUS --- */
  .card[data-status="ACTIVE"] .status-ACTIVE,
  .card[data-status="ACTIVE"].is-active::before { animation-duration: 1.5s; }
  .card[data-status="STANDBY"].is-active::before { animation-duration: 4s; opacity: 0.2; }
  .card[data-status="ONLINE"].is-active::before { animation-duration: 2.5s; }

  .card.is-active .status-ACTIVE { animation: status-pulse 1.5s ease-in-out infinite; }
  @keyframes status-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .progress-ring { position: absolute; top: 8px; right: 8px; width: 40px; height: 40px; transform: rotate(-90deg); }
  .progress-ring-bg { fill: none; stroke: var(--edge); stroke-width: 3; }
  .progress-ring-fg { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 100; stroke-dashoffset: 100; transition: stroke-dashoffset 0.8s ease, stroke 0.4s ease; }

  .card::after {
    content: ""; position: absolute; inset: 0;
    border-radius: inherit; pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
    background: conic-gradient(from var(--angle), #E5E9F2, #B8C6E0, #8A9CB8, #B8C6E0, #E5E9F2);
    mix-blend-mode: overlay; filter: url(#holo-displacement) brightness(1.3) contrast(1.1);
  }
  .card:hover { border-color: var(--accent); }
  .card:hover::after { opacity: 0.6; }
  
  .card-content { position: relative; padding: 16px; height: 100%; display: flex; flex-direction: column; }
  .card-header { display: flex; justify-content: space-between; font-family: Ubuntu, Arial, sans-serif; z-index: 2;}
  .card-id { font-size: 16px; font-weight: 500; color: var(--ink-header); }
  .card-type { font-size: 14px; color: var(--ink-sub); }
  
  .card-visuals { position: relative; flex-grow: 1; margin: 16px 0; display: grid; place-items: center; }

  /* --- MEJORA: BLOOM ESPECTRAL Y SCANLINE --- */
  .tech-icon-container { position: relative; display: grid; place-items: center; }
  .tech-icon-container img { width: 90px; height: 90px; opacity: 0.6; object-fit: contain; filter: drop-shadow(0 0 15px var(--accent-glow)); transition: opacity 0.3s ease; }
  .card:hover .tech-icon-container img { opacity: 1; }
  .tech-icon-container::after { /* Bloom effect */
    content: ''; position: absolute; width: 100%; height: 100%;
    background-image: var(--logo-url); background-size: contain; background-position: center; background-repeat: no-repeat;
    filter: blur(12px); mix-blend-mode: screen; opacity: 0; transition: opacity 0.4s ease;
  }
  .card:hover .tech-icon-container::after { opacity: 0.7; }
  .tech-icon-container::before { /* Holo-scanline */
    content: ''; position: absolute; left: 0; top: -10%; width: 100%; height: 4px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
    transform: translateY(-50px) scaleX(1.5); opacity: 0;
    transition: transform 0.8s ease-out, opacity 0.8s ease-out;
  }
  .card:hover .tech-icon-container::before { transform: translateY(120px) scaleX(1.5); opacity: 1; transition-delay: 0.1s; }

  /* --- MEJORA: ANILLOS DE ENERGÍA ORBITALES --- */
  .energy-orbit, .energy-orbit::after {
    position:absolute; inset: -20px; border-radius:50%;
    border: 1px dashed var(--accent); opacity:0;
    animation: orbit 12s linear infinite; transition: opacity 0.5s;
  }
  .energy-orbit::after { content:""; border-style: solid; animation-duration: 8s; animation-direction: reverse; }
  .card:hover .energy-orbit, .card.is-active .energy-orbit { opacity: 0.15; }
  @keyframes orbit { to { transform: rotate(360deg); } }

  .card-footer { font-family: Ubuntu, Arial, sans-serif; font-size: 11px; text-transform: uppercase; z-index: 2; }
  .card-footer-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .card-footer-row:last-child { border-bottom: none; }
  .status-value { font-weight: 700 !important; }
  .status-ONLINE { color: var(--status-online); } .status-ACTIVE { color: var(--status-active); } .status-STANDBY { color: var(--status-standby); }

  /* --- MEJORA: CHIPS DE MÉTRICAS Y SPARKLINE --- */
  .mini-metrics {
    position: absolute; bottom: 50px; left: 16px; right: 16px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px; font-family: Ubuntu, Arial, sans-serif;
  }
  .mini-metric-chip {
    font-size: 9px; padding: 2px 4px; border-radius: 3px;
    background: rgba(0,0,0,0.4); color: var(--ink-sub);
  }
  .sparkline {
    flex-grow: 1; height: 20px;
  }
  .sparkline path {
    fill: none; stroke: var(--accent); stroke-width: 1.5;
    opacity: 0.4;
  }
  .card:hover .sparkline path { opacity: 0.8; }
  
  /* --- UI Controls --- */
  .ui { display: none !important; }
  .btn {
    appearance: none; border: 1px solid var(--edge); border-radius: 999px; padding: 7px 10px;
    font-size: 10px; font-family: Ubuntu, Arial, sans-serif; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-sub);
    background: rgba(15, 18, 25, 0.3); backdrop-filter: blur(5px);
    cursor: pointer; transition: all .2s ease;
  }
  .btn:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* --- ESTRUCTURA DEL MODAL --- */
  .holopanel { position: fixed; inset: 0; z-index: 200; display: grid; place-items: center; pointer-events: none; opacity: 0; }
  .holopanel.is-open { pointer-events: auto; opacity: 1; }
  .holopanel-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
  .holopanel-container {
    position: relative; width: min(1100px, 95vw); height: min(720px, 90vh);
    background: rgba(10, 12, 22, 0.6); border: 1px solid var(--edge-light); border-radius: 12px;
    backdrop-filter: blur(24px); display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); will-change: transform, opacity;
  }
  .holopanel-header { padding: 12px 18px; border-bottom: 1px solid var(--edge); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .holopanel-header h2 { margin: 0; font-size: 12px; font-weight: 500; font-family: Ubuntu, Arial, sans-serif; color: var(--ink-header); }
  .holopanel-tabs { display: flex; gap: 8px; }
  .holopanel-tab { padding: 6px 10px; border-radius: 6px; font-size: 11px; font-family: Ubuntu, Arial, sans-serif; color: var(--ink-sub); background: transparent; cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; }
  .holopanel-tab.is-active { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }
  
  .holopanel-body { flex-grow: 1; position: relative; }
  .holopanel-page { position: absolute; inset: 0; opacity: 0; visibility: hidden; transition: opacity 0.3s ease; overflow-y: auto; }
  .holopanel-page.is-active { opacity: 1; visibility: visible; }
  
  .modal-layout { display: flex; height: 100%; }
  .modal-sidebar {
    width: 300px; flex-shrink: 0;
    padding: 24px; border-right: 1px solid var(--edge);
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .modal-logo { width: 120px; height: 120px; object-fit: contain; margin-bottom: 24px; }
  .mastery-ring-container { position: relative; width: 160px; height: 160px; margin-bottom: 24px; }
  .mastery-ring-svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .mastery-ring-bg, .mastery-ring-fg { fill: none; stroke-width: 10; }
  .mastery-ring-bg { stroke: var(--edge); }
  .mastery-ring-fg { stroke: var(--accent); stroke-linecap: round; filter: drop-shadow(0 0 5px var(--accent-glow)); }
  .mastery-percentage { position: absolute; inset: 0; display: grid; place-items: center; font-size: 36px; font-weight: 700; font-family: Ubuntu, Arial, sans-serif; color: var(--ink-header); }
  .sidebar-stat { font-family: Ubuntu, Arial, sans-serif; }
  .sidebar-stat dt { text-transform: uppercase; font-size: 12px; color: var(--ink-sub); margin-bottom: 4px; }
  .sidebar-stat dd { font-size: 18px; font-weight: 500; margin: 0; }
  
  /* --- MEJORA: CTAs ÚTILES EN EL PANEL LATERAL --- */
  .sidebar-ctas {
    margin-top: 24px; display: flex; flex-direction: column; gap: 10px; width: 100%;
  }
  .sidebar-cta {
    font-size: 12px; text-decoration: none; padding: 8px 12px;
    border-radius: 6px; border: 1px solid var(--edge);
    color: var(--ink-sub); background: rgba(255,255,255,0.05);
    transition: all 0.2s ease;
  }
  .sidebar-cta:hover { color: var(--accent); border-color: var(--accent); }

  .modal-main-content { flex-grow: 1; padding: 24px; }
  .modal-section { margin-bottom: 32px; }
  .modal-section h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-sub); margin: 0 0 12px; border-bottom: 1px solid var(--edge); padding-bottom: 6px; }
  .description-text { font-size: 11px; line-height: 1.5; color: var(--ink); }
  
  .log-container { height: 100%; font-family: Ubuntu, Arial, sans-serif; font-size: 13px; padding: 24px; scroll-behavior: smooth; }
  .log-entry { margin-bottom: 8px; opacity: 0; animation: fadeIn 0.3s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }

  .holopanel-close { position: absolute; top: 12px; right: 18px; z-index: 5; background: none; border: none; font-size: 28px; color: var(--ink-sub); cursor: pointer; transition: color 0.2s, transform 0.2s; }
  .holopanel-close:hover { color: var(--ink); transform: scale(1.1); }

  /* --- Partículas y otros efectos --- */
  .particles-container { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .particle {
    position: absolute; width: 2px; height: 2px; background: var(--accent); border-radius: 50%;
    opacity: 0; pointer-events: none;
  }
  .card.is-active .particle, .card:hover .particle { animation: particle-float 3s ease-out infinite; }
  @keyframes particle-float {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    20% { opacity: 1; transform: translateY(-20px) scale(1); }
    80% { opacity: 0.8; transform: translateY(-60px) scale(0.8); }
    100% { opacity: 0; transform: translateY(-100px) scale(0); }
  }
  .card-trail {
    position: absolute; width: 100%; height: 100%; border-radius: inherit;
    background: linear-gradient(45deg, transparent, var(--accent-glow), transparent);
    opacity: 0; pointer-events: none; z-index: -1;
  }
  .card.is-active .card-trail { animation: trail-glow 2s ease-in-out infinite; }
  @keyframes trail-glow {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(1.05); }
  }

  /* --- Panel de Estadísticas --- */
  .stats-panel {
    position: fixed; inset: 0; z-index: 150; display: grid; place-items: center;
    pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
  }
  .stats-panel.is-open { pointer-events: auto; opacity: 1; }
  .stats-container {
    width: min(900px, 95vw); height: min(600px, 85vh); background: rgba(10, 12, 22, 0.8);
    border: 1px solid var(--edge-light); border-radius: 12px; backdrop-filter: blur(20px);
    display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .stats-header { padding: 20px 24px; border-bottom: 1px solid var(--edge); display: flex; justify-content: space-between; align-items: center; }
  .stats-header h3 { margin: 0; font-size: 18px; font-weight: 500; font-family: Ubuntu, Arial, sans-serif; color: var(--ink-header); }
  .stats-close { background: none; border: none; font-size: 24px; color: var(--ink-sub); cursor: pointer; transition: color 0.2s; }
  .stats-close:hover { color: var(--ink); }
  .stats-content { flex-grow: 1; padding: 24px; overflow-y: auto; }
  .stats-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 32px; }
  .stat-card { background: rgba(15, 18, 25, 0.4); border: 1px solid var(--edge); border-radius: 8px; padding: 20px; text-align: center; transition: all 0.3s ease; }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .stat-number { font-size: 18px; font-weight: 700; font-family: Ubuntu, Arial, sans-serif; color: var(--accent); margin-bottom: 6px; }
  .stat-label { font-size: 12px; text-transform: uppercase; color: var(--ink-sub); letter-spacing: 0.1em; }
  .stats-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .chart-container { background: rgba(15, 18, 25, 0.3); border: 1px solid var(--edge); border-radius: 8px; padding: 20px; }
  .chart-container h4 { margin: 0 0 16px 0; font-size: 14px; font-weight: 600; text-transform: uppercase; color: var(--ink-sub); letter-spacing: 0.1em; }
  .category-chart, .level-chart { height: 200px; display: flex; align-items: end; gap: 8px; }
  .chart-bar { flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; transition: all 0.3s ease; position: relative; }
  .chart-bar:hover { background: var(--status-online); transform: scaleY(1.1); }
  .chart-bar::after {
    content: attr(data-label); position: absolute; bottom: -20px; left: 50%;
    transform: translateX(-50%); font-size: 10px; color: var(--ink-sub); white-space: nowrap;
  }

  /* --- Interactividad y otros --- */
  .voice-command {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10, 12, 22, 0.8); border: 1px solid var(--accent);
    border-radius: 20px; padding: 8px 16px; color: var(--accent);
    font-family: Ubuntu, Arial, sans-serif; font-size: 12px;
    opacity: 0; transition: opacity 0.3s ease; z-index: 1000;
    pointer-events: none;
  }
  .voice-command.is-active { opacity: 1; }
  .info-toggle {
    position: fixed; top: 16px; left: 16px; z-index: 1001;
    width: 34px; height: 34px; border-radius: 999px;
    border: 1px solid var(--edge); background: rgba(10, 12, 22, 0.82);
    color: var(--accent); font-weight: 700; cursor: pointer;
  }
  .gesture-hint {
    position: fixed; top: 58px; left: 16px; z-index: 1001; background: rgba(10, 12, 22, 0.92);
    border: 1px solid var(--edge); border-radius: 8px; padding: 12px;
    color: var(--ink-sub); font-family: Ubuntu, Arial, sans-serif;
    font-size: 11px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .gesture-hint.is-open { opacity: 1; pointer-events: auto; }
  .gesture-hint h4 { margin: 0 0 8px 0; color: var(--accent); font-size: 12px; }
  .gesture-hint ul { margin: 0; padding-left: 16px; }
  .gesture-hint li { margin-bottom: 4px; }
  .anta-orb {
    position: fixed; right: 28px; bottom: 28px; z-index: 1200;
    width: 118px; height: 118px; border-radius: 50%; overflow: hidden;
    background: transparent;
  }
  .anta-orb iframe { position:absolute; inset:0; width:100%; height:100%; border:0; border-radius:50%; pointer-events:none; background:transparent; }
  .anta-orb button { position:absolute; inset:0; border:0; border-radius:50%; background:transparent; cursor:pointer; touch-action:manipulation; appearance:none; outline:none; -webkit-tap-highlight-color:transparent; user-select:none; }
  .anta-orb.listening { animation: orb-listen 1s ease-in-out infinite; }
  @keyframes orb-listen { 50% { transform: scale(1.08); } }
  .media-preview { height: 100%; display: grid; gap: 12px; align-content: start; }
  .media-preview h4 { margin: 0; color: var(--accent); font-family: Ubuntu, Arial, sans-serif; font-size: 13px; }
  .media-player { width: 100%; border: 1px solid rgba(137,245,255,.25); border-radius: 12px; background: #05070d; box-shadow: 0 0 22px rgba(137,245,255,.08); }
  .media-player.video { aspect-ratio: 16 / 9; max-height: 42vh; }
  .media-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .media-actions a { padding:8px 12px; border:1px solid var(--edge); border-radius:999px; background:rgba(255,255,255,.05); color:#89f5ff; font-size:12px; }
  .file-dialog-overlay { position:absolute; inset:0; z-index:20; align-items:center; justify-content:center; background:rgba(0,0,0,.55); backdrop-filter:blur(8px); }
  .file-dialog { width:min(560px,92vw); display:grid; gap:12px; padding:18px; border:1px solid var(--edge-light); border-radius:12px; background:rgba(10,12,22,.96); }
  @media (max-width: 640px) {
    .scene { top: 140px; left: 18px; }
    .card { width: 235px; height: 336px; }
    .holopanel { place-items: stretch; }
    .holopanel-container, .holopanel-container.is-maximized {
      width: 100vw !important; height: 100dvh !important; max-width: 100vw !important; max-height: 100dvh !important;
      border-radius: 0 !important; border: 0 !important; transform: none !important;
    }
    .holopanel-header { padding: 10px 12px !important; min-height: 48px; gap:8px; }
    .holopanel-header h2 { font-size: 13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .holopanel-body { height: calc(100dvh - 48px) !important; overflow: hidden !important; padding-bottom: 112px; }
    .holopanel-body:has(#notes-list) > div,
    .holopanel-body:has(#files-list) > div { flex-direction: column !important; min-height: 100%; height: auto !important; overflow: visible !important; }
    .holopanel-body:has(#notes-list) > div > div:first-child,
    .holopanel-body:has(#files-list) > div > div:nth-child(2) { width:100% !important; max-height: 24dvh; border-right:0 !important; border-bottom:1px solid rgba(255,255,255,.1); }
    .holopanel-body:has(#notes-list) > div > div:nth-child(2),
    .holopanel-body:has(#files-list) > div > div:nth-child(3) { padding:14px !important; min-height: 58dvh; }
    #files-list button { padding:6px !important; margin-bottom:4px !important; }
    #notes-list button { padding:8px !important; margin-bottom:4px !important; }
    #note-tabs, #file-tabs { min-height: 38px !important; }
    #note-body { height: 32dvh !important; min-height: 0 !important; flex: 0 0 32dvh !important; }
    #files-grid { min-height: 22dvh; max-height: 24dvh; align-content:flex-start; overflow:hidden !important; }
    #file-view { min-height: 24dvh !important; max-height: 28dvh !important; overflow:hidden !important; }
    #yt-box, #gg-box { padding:14px !important; }
    #yt-box > div:first-child, #gg-box > div:first-child { flex-direction:column; }
    #yt-box input, #gg-box input { width:100%; }
    #yt-player-box { min-height: 50dvh; max-height: 58dvh; }
    .holopanel-body:has(#new-card-name) > div { padding:18px !important; max-width:none !important; }
    .holopanel-body:has(#new-card-name) div[style*="grid-template-columns"] { grid-template-columns:1fr !important; }
    .stats-container { width: 100vw; height: 100dvh; border-radius: 0; border: 0; }
    .stats-content { padding:14px; padding-bottom:112px; overflow:hidden; }
    .stats-charts { grid-template-columns: 1fr; }
    .file-dialog-overlay { position: fixed; }
    .file-dialog { width:100vw; height:100dvh; border-radius:0; border:0; padding:14px; align-content:start; }
    .file-dialog textarea { height:45vh !important; }
    .anta-orb { right: 18px; bottom: 22px; width: 92px; height: 92px; }
  }
  
  .data-sync {
    position: fixed; top: 20px; right: 20px; background: rgba(10, 12, 22, 0.8);
    border: 1px solid var(--edge); border-radius: 8px; padding: 12px;
    color: var(--ink-sub); font-family: Ubuntu, Arial, sans-serif;
    font-size: 11px; opacity: 0; transition: opacity 0.3s ease; z-index: 1000;
    pointer-events: none;
  }
  .data-sync.is-active { opacity: 1; }
  .data-sync.success { border-color: var(--status-online); color: var(--status-online); }
  .data-sync.error { border-color: #ff6b6b; color: #ff6b6b; }
  .tech-trend {
    position: absolute; top: 12px; left: 12px; font-size: 14px;
    font-family: Ubuntu, Arial, sans-serif;
  }
  .tech-trend.up { color: var(--status-online); } .tech-trend.down { color: #ff6b6b; }

  /* --- Estilos para contenido de modal mejorado --- */
  .performance-grid { display: grid; gap: 16px; margin-top: 16px; }
  .performance-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(15, 18, 25, 0.3); border: 1px solid var(--edge); border-radius: 8px; }
  .performance-label { font-size: 12px; color: var(--ink-sub); text-transform: uppercase; min-width: 120px; }
  .performance-bar { flex-grow: 1; height: 8px; background: var(--edge); border-radius: 4px; overflow: hidden; }
  .performance-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--status-online)); border-radius: 4px; transition: width 1s ease; }
  .performance-value { font-size: 14px; font-weight: 600; color: var(--accent); min-width: 40px; text-align: right; }
  .content-placeholder { padding: 24px; text-align: center; color: var(--ink-sub); }
  .holopanel-container, .stats-container { font-size: 11px; }
  .holopanel-container *, .stats-container * { font-family: Ubuntu, Arial, sans-serif !important; }
  .holopanel-container input, .holopanel-container textarea, .holopanel-container button,
  .stats-container input, .stats-container button { font-family: Ubuntu, Arial, sans-serif !important; font-size: 11px !important; }
  .holopanel-container h2, .holopanel-container h3, .holopanel-container h4,
  .stats-container h3, .stats-container h4 { font-family: Ubuntu, Arial, sans-serif !important; font-size: 12px !important; }
  .file-grid-item div:last-child { font-size: 10px !important; }
  #file-view, #note-body, #note-title, #file-body, #file-name { font-size: 11px !important; }
  #file-view pre { font: 11px/1.45 Ubuntu, Arial, sans-serif !important; }

  /* --- Soporte para movimiento reducido --- */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }
    .card:hover { transform: translateY(-5px) scale(1.02); }
  }
  .holopanel-container.is-minimized {
    width: 300px !important;
    height: 54px !important;
    position: fixed !important;
    bottom: 20px !important;
    right: 20px !important;
    left: auto !important;
    top: auto !important;
    transform: none !important;
    border-radius: 8px !important;
  }
  .holopanel-container.is-minimized .holopanel-body {
    display: none !important;
  }
  .holopanel-container.is-maximized {
    width: 100vw !important;
    height: 100vh !important;
    max-width: 100vw !important;
    max-height: 100vh !important;
    top: 0 !important;
    left: 0 !important;
    border-radius: 0 !important;
    transform: none !important;
  }
  .holopanel.is-minimized-parent {
    display: block !important;
    pointer-events: none !important;
  }
  .holopanel.is-minimized-parent #holopanel-container {
    pointer-events: auto !important;
  }
</style>

<body>

  <svg style="position:absolute; width:0; height:0;">
    <filter id="holo-displacement">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="3" seed="5" />
      <feDisplacementMap in="SourceGraphic" scale="10" />
    </filter>
  </svg>

  <div class="environment-overlay"></div>
  <div class="ui">
    <button class="btn" id="prev">ANTERIOR</button>
    <button class="btn" id="next">SIGUIENTE</button>
    <button class="btn" id="mute">SONIDO: ON</button>
    <button class="btn" id="stats-toggle">ESTADÍSTICAS</button>
  </div>

  <div class="stats-panel" id="stats-panel">
    <div class="stats-container">
      <div class="stats-header">
        <h3>Dashboard de Habilidades</h3>
        <button class="stats-close" id="stats-close">&times;</button>
      </div>
      <div class="stats-content">
        <div class="stats-overview">
          <div class="stat-card">
            <div class="stat-number" id="total-skills">0</div>
            <div class="stat-label">Tecnologías</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="total-projects">0</div>
            <div class="stat-label">Proyectos</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="total-commits">0</div>
            <div class="stat-label">Commits</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="avg-level">0%</div>
            <div class="stat-label">Promedio</div>
          </div>
        </div>
        <div class="stats-charts">
          <div class="chart-container">
            <h4>Distribución por Categoría</h4>
            <div class="category-chart" id="category-chart"></div>
          </div>
          <div class="chart-container">
            <h4>Nivel de Experiencia</h4>
            <div class="level-chart" id="level-chart"></div>
          </div>

  </div>
  <div class="viewport">
    <div class="scene" id="scene"><div class="floor-grid"></div><div class="pipeline" id="pipeline"></div></div>
  </div>
  <div class="holopanel" id="holopanel" aria-hidden="true">
    <div class="holopanel-backdrop" data-flip-id="backdrop"></div>
    <div class="holopanel-container" id="holopanel-container"></div>
  </div>

  <div class="voice-command" id="voice-command" aria-live="polite">Escuchando...</div>
  <button class="info-toggle" id="info-toggle" type="button" aria-label="Info">!</button>
  <div class="gesture-hint" id="gesture-hint">
    <h4>Controls</h4>
    <ul>
      <li>← → / Swipe to Navigate</li>
      <li>Enter / Click to Open</li>
      <li>Esc to Close</li>
      <li>Mouse & Touch drag supported</li>
    </ul>
  </div>
  <div class="data-sync" id="data-sync">
    <div>Sincronizando datos...</div>
  </div>
  <div class="anta-orb" id="anta-orb">
    <iframe src="/orb/index.html" title="Anta" aria-hidden="true"></iframe>
    <button type="button" id="anta-orb-btn" aria-label="Perintah Anta"></button>
  </div>

<script>
(() => {
  gsap.registerPlugin(Flip);
  const D = (a, b) => Math.random() * (b - a) + a;
  const R = (a, b) => Math.floor(D(a, b + 1));

  // --- BASE DE DATOS MEJORADA (sin cambios en estructura, solo se usará más info) ---
  const DEFAULT_SKILLS = [
    { id: 'folder', name: 'Folder', level: 100, years: 'Active', category: 'Utility', description: 'Manage local data files and system folders.', projects: 0, commits: 0, logoUrl: 'https://img.icons8.com/ios-filled/100/89f5ff/folder-invoices.png', performance: {}, stack: [], experience: [], changelog: [] },
    { id: 'notepad', name: 'Notepad', level: 100, years: 'Active', category: 'Utility', description: 'Quick note editor with automatic database syncing.', projects: 0, commits: 0, logoUrl: 'https://img.icons8.com/ios-filled/100/89f5ff/document.png', performance: {}, stack: [], experience: [], changelog: [] },
    { id: 'music', name: 'Spotify', level: 100, years: 'Connected', category: 'Music', description: 'Play music on Spotify and control active devices.', projects: 0, commits: 0, logoUrl: 'https://img.icons8.com/ios-filled/100/1db954/spotify.png', performance: {}, stack: [], experience: [], changelog: [] },
    { id: 'video', name: 'YouTube', level: 100, years: 'Search', category: 'Video', description: 'Search and play YouTube video streams.', projects: 0, commits: 0, logoUrl: 'https://img.icons8.com/ios-filled/100/ff0000/youtube-play.png', performance: {}, stack: [], experience: [], changelog: [] },
    { id: 'google', name: 'Google', level: 100, years: 'Search', category: 'Google', description: 'Search Google and view article fallback results.', projects: 0, commits: 0, logoUrl: 'https://img.icons8.com/color/100/google-logo.png', performance: {}, stack: [], experience: [], changelog: [] },
    { id: 'plus1', name: '[ Add Card ]', level: 0, years: 'Inactive', category: 'Plus', description: 'Add a new custom HUD device card.', projects: 0, commits: 0, logoUrl: 'https://img.icons8.com/ios-glyphs/100/ffffff/plus.png', performance: {}, stack: [], experience: [], changelog: [] },
    { id: 'plus2', name: '[ Add Card ]', level: 0, years: 'Inactive', category: 'Plus', description: 'Add a new custom HUD device card.', projects: 0, commits: 0, logoUrl: 'https://img.icons8.com/ios-glyphs/100/ffffff/plus.png', performance: {}, stack: [], experience: [], changelog: [] },
    { id: 'plus3', name: '[ Add Card ]', level: 0, years: 'Inactive', category: 'Plus', description: 'Add a new custom HUD device card.', projects: 0, commits: 0, logoUrl: 'https://img.icons8.com/ios-glyphs/100/ffffff/plus.png', performance: {}, stack: [], experience: [], changelog: [] }
  ];
  let stored = localStorage.getItem("anta_menu_custom_cards");
  const SKILLS_DATA = stored ? JSON.parse(stored) : DEFAULT_SKILLS;

  const GAP_X = 150, STEP_Z = -80, BASE_Y = -40;
  const scene = document.getElementById('scene');
  const pipeline = document.getElementById('pipeline');
  const holopanel = document.getElementById('holopanel');
  const holopanelContainer = document.getElementById('holopanel-container');
  const backdrop = document.querySelector('.holopanel-backdrop');
  const statsPanel = document.getElementById('stats-panel');
  const voiceCommand = document.getElementById('voice-command');
  const gestureHint = document.getElementById('gesture-hint');
  const infoToggle = document.getElementById('info-toggle');
  infoToggle.onclick = () => gestureHint.classList.toggle('is-open');
  function updateInfoToggle() {
    const fullscreen = window.matchMedia('(max-width: 640px)').matches || holopanelContainer.classList.contains('is-maximized') || isStatsOpen;
    infoToggle.style.display = (fullscreen && (isPanelOpen || isStatsOpen)) ? 'none' : '';
    if (infoToggle.style.display === 'none') gestureHint.classList.remove('is-open');
  }

  const soundEngine = {
    isMuted: false, sounds: {},
    init() {
      this.sounds.click = new Audio("/audio/orb-water-click.mp3");
      this.sounds.whoosh = new Audio();
      this.sounds.shine = new Audio();
      this.sounds.open = new Audio();
      this.sounds.click.volume = 0.35;
    },
    play(name) { if (!this.isMuted && this.sounds[name]) { this.sounds[name].currentTime = 0; this.sounds[name].play().catch(e=> {}); } },
    toggleMute() { this.isMuted = !this.isMuted; document.getElementById('mute').textContent = `SONIDO: ${this.isMuted ? 'OFF' : 'ON'}`; }
  };
  soundEngine.init();

  const cards = [];
  let activeModalAnimations = null;
  let isPanelOpen = false, isStatsOpen = false, isVoiceActive = false;
  let active = 0;
  let wasDragged = false;

  const TECH_TRENDS = { 'react': { trend: 'up'}, 'javascript': { trend: 'up'}, 'python': { trend: 'up'} };
  const nodes = SKILLS_DATA.map(skill => ({
      ...skill, status: ["ONLINE", "ACTIVE", "STANDBY"][R(0, 2)],
      logs: Array.from({ length: R(5, 10) }, () => `${new Date(Date.now() - R(1000, 3600000)).toLocaleTimeString()} | SYSTEM: Update Synced...`),
      trend: TECH_TRENDS[skill.id]?.trend || 'stable'
  }));

  // MEJORA: Función para generar una ruta SVG de sparkline aleatoria
  function generateSparklinePath(node) {
    const points = Array.from({ length: 20 }, (_, i) => 
      `${i * 5},${D(5, 20) * (node.level / 100) + D(0, 5)}`
    ).join(' ');
    return `M${points}`;
  }

  nodes.forEach((node, i) => {
    const card = document.createElement('div');
    card.className = 'card'; card.dataset.id = node.id; card.dataset.flipId = `card-${i}`; card.dataset.status = node.status;
    gsap.set(card, { x: i * GAP_X, y: BASE_Y, z: i * STEP_Z });

    const progressRing = `
      <svg class="progress-ring" viewBox="0 0 100 100">
        <circle class="progress-ring-bg" cx="50" cy="50" r="45"></circle>
        <circle class="progress-ring-fg" cx="50" cy="50" r="45" 
                stroke-dasharray="${2 * Math.PI * 45}" 
                stroke-dashoffset="${2 * Math.PI * 45 * (1 - node.level / 100)}"></circle>
      </svg>`;

    const particlesContainer = `
      <div class="particles-container">
        ${Array.from({length: 8}, (_, j) => 
          `<div class="particle" style="left: ${20 + j * 8}%; top: ${30 + (j % 3) * 20}%; animation-delay: ${j * 0.2}s;"></div>`
        ).join('')}
      </div>`;
    
    const trendBadge = node.trend !== 'stable' ? `<div class="tech-trend ${node.trend}">${node.trend === 'up' ? '↗' : '↘'}</div>` : '';
    
    // MEJORA: Chips de métricas y sparkline
    const miniMetrics = `
      <div class="mini-metrics">
        <span class="mini-metric-chip">PRJ ${node.projects}</span>
        <svg class="sparkline" viewBox="0 0 100 24"><path d="${generateSparklinePath(node)}"/></svg>
        <span class="mini-metric-chip">COMMITS ${Math.floor(node.commits/1000)}k</span>
      </div>`;

    card.innerHTML = `
      ${progressRing}
      ${particlesContainer}
      <div class="card-trail"></div>
      <div class="card-content" data-flip-id="content-${i}">
        <div class="card-header">
          <div class="card-id">${node.name}</div>
          <div class="card-type">${node.category}</div>
        </div>
        <div class="card-visuals" style="margin-top: 40px;">
          <div class="tech-icon-container" style="--logo-url: url(${node.logoUrl})">
             <img src="${node.logoUrl}" alt="${node.name} logo" loading="lazy" decoding="async">
             <div class="energy-orbit"></div>
          </div>
        </div>
        <div class="card-status-active">ACTIVE</div>
      </div>
      <div class="card-fader" data-flip-id="fader-${i}"></div>
    `;
    
    pipeline.appendChild(card); cards.push(card);

    card.addEventListener('mouseenter', () => { soundEngine.play('shine'); scene.classList.add('is-card-hovered'); });
    card.addEventListener('mouseleave', () => scene.classList.remove('is-card-hovered'));
    card.addEventListener('mousemove', e => {
      const rect = card.getBoundingClientRect();
      const cardX = e.clientX - rect.left;
      const cardY = e.clientY - rect.top;
      // --angle for holo effect
      card.style.setProperty('--angle', `${Math.atan2(cardY - rect.height/2, cardX - rect.width/2) * (180/Math.PI) + 180}deg`);
      // MEJORA: --tilt for magnetic tilt
      const tiltX = (cardX / rect.width - 0.5) * 20; // -10 to 10
      const tiltY = (0.5 - cardY / rect.height) * 20; // -10 to 10
      gsap.to(card, { '--tilt-x': `${tiltX}deg`, '--tilt-y': `${tiltY}deg`, duration: 0.5, ease: 'power2.out' });
    });
    card.addEventListener('click', (e) => {
      if (wasDragged) {
        wasDragged = false;
        return;
      }
      setActive(i);
      openPanel(i);
    });
  });

  function setActive(idx, instant = false) {
    active = Math.max(0, Math.min(idx, nodes.length - 1));
    if (!instant) soundEngine.play('whoosh');
    gsap.to(pipeline, { x: -(active * GAP_X), z: -(active * STEP_Z), duration: instant ? 0 : 0.8, ease: 'power3.inOut' });
    cards.forEach((c, i) => c.classList.toggle('is-active', i === active));
    document.getElementById('prev').disabled = (active === 0);
    document.getElementById('next').disabled = (active === nodes.length - 1);
  }

  const parentApi = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1') ? 'http://127.0.0.1:8000' : 'https://jarpis-production-a270.up.railway.app';

  function initNotepad() {
    const list = document.getElementById('notes-list');
    const tabsEl = document.getElementById('note-tabs');
    const titleIn = document.getElementById('note-title');
    const bodyIn = document.getElementById('note-body');
    let activeId = null;
    let noteTabs = [];
    const renderNoteTabs = () => {
      tabsEl.innerHTML = '';
      noteTabs.forEach(n => {
        const tab = document.createElement('button');
        tab.textContent = (n.title || 'Untitled') + (n.id === activeId ? ' ●' : '');
        tab.style.cssText = "padding:7px 10px; border-radius:999px; border:1px solid " + (n.id === activeId ? "#89f5ff" : "rgba(255,255,255,0.15)") + "; background:" + (n.id === activeId ? "rgba(137,245,255,0.16)" : "rgba(255,255,255,0.05)") + "; color:#fff; cursor:pointer; white-space:nowrap;";
        tab.onclick = () => openNote(n);
        tabsEl.appendChild(tab);
      });
    };
    const openNote = (n) => {
      if (!noteTabs.some(x => x.id === n.id)) noteTabs.push(n);
      activeId = n.id;
      titleIn.value = n.title || '';
      bodyIn.value = n.content || '';
      renderNoteTabs();
    };
    const loadNotes = () => {
      console.log('loadNotes execution started');
      list.innerHTML = 'Loading notes...';
      fetch(parentApi + '/api/notes')
        .then(r => {
          console.log('loadNotes fetch status:', r.status);
          return r.json();
        })
        .then(data => {
          console.log('loadNotes data:', data);
          list.innerHTML = '';
          if (!data || data.length === 0) {
            list.innerHTML = '<div style="color:#607090; font-size:11px; padding:12px; font-family:monospace;">No notes found. (Empty)</div>';
            return;
          }
          data.forEach(n => {
            const btn = document.createElement('button');
            btn.textContent = n.title || 'Untitled Note';
            btn.style.cssText = "width:100%; text-align:left; padding:10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:#fff; cursor:pointer; margin-bottom:8px;";
            btn.onclick = () => openNote(n);
            list.appendChild(btn);
          });
        }).catch((err) => { 
          console.log('LOAD NOTES ERROR:', err);
          list.innerHTML = '<div style="color:#607090; font-size:11px; padding:12px; font-family:monospace;">No notes found. (Empty)</div>'; 
        });
    };
    document.getElementById('add-note-btn').onclick = () => {
      openNote({ id: 0, title: '', content: '' });
    };
    document.getElementById('save-note-btn').onclick = () => {
      if (!titleIn.value.trim()) return alert('Note Title is required');
      soundEngine.play('click');
      fetch(parentApi + '/api/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: activeId || null, title: titleIn.value, content: bodyIn.value })
      }).then(r => r.json()).then(saved => {
        noteTabs = noteTabs.filter(n => n.id && n.id !== saved.id);
        openNote(saved);
        loadNotes();
      });
    };
    document.getElementById('delete-note-btn').onclick = () => {
      if (!activeId) return alert('Select a note to delete');
      soundEngine.play('click');
      fetch(parentApi + '/api/notes/' + activeId, { method: 'DELETE' })
        .then(() => {
          noteTabs = noteTabs.filter(n => n.id !== activeId);
          titleIn.value = '';
          bodyIn.value = '';
          activeId = null;
          renderNoteTabs();
          loadNotes();
        });
    };
    loadNotes();
  }

  function initFolder() {
    const list = document.getElementById('files-list');
    const grid = document.getElementById('files-grid');
    const tabsEl = document.getElementById('file-tabs');
    const viewEl = document.getElementById('file-view');
    const pathTitle = document.getElementById('current-path-title');
    const dialogOverlay = document.getElementById('file-dialog-overlay');
    const nameIn = document.getElementById('file-name');
    const bodyIn = document.getElementById('file-body');
    let activeFileId = null;
    let currentFolderPath = '/Document';
    let allFs = [];
    let fileTabs = [];
    let activeTabId = null;

    const renderFileTabs = () => {
      tabsEl.innerHTML = '';
      fileTabs.forEach(f => {
        const tab = document.createElement('button');
        tab.textContent = f.name + (f.id === activeTabId ? ' ●' : '');
        tab.style.cssText = "padding:7px 10px; border-radius:999px; border:1px solid " + (f.id === activeTabId ? "#89f5ff" : "rgba(255,255,255,0.15)") + "; background:" + (f.id === activeTabId ? "rgba(137,245,255,0.16)" : "rgba(255,255,255,0.05)") + "; color:#fff; cursor:pointer; white-space:nowrap;";
        tab.onclick = () => openFileTab(f);
        tabsEl.appendChild(tab);
      });
    };

    const esc = (s) => String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const youtubeId = (s) => {
      if (!s) return '';
      if (s.includes('youtu.be/')) return s.split('youtu.be/')[1].split(/[?&]/)[0];
      if (s.includes('v=')) return s.split('v=')[1].split('&')[0];
      return /^[\w-]{11}$/.test(s.trim()) ? s.trim() : '';
    };
    const renderPreview = (f) => {
      const name = f.name || 'file';
      const content = f.content || '';
      const lower = name.toLowerCase();
      const src = content.startsWith('data:') || /^https?:\/\//.test(content) ? content : '';
      const yt = youtubeId(content);
      if (yt) return `<div class="media-preview"><h4>🎬 ${esc(name)}</h4><iframe class="media-player video" src="https://www.youtube.com/embed/${yt}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe><div class="media-actions"><a href="https://youtu.be/${yt}" target="_blank">Open YouTube</a></div></div>`;
      if (content.startsWith('data:image/') || /\.(png|jpe?g|gif|webp|svg)$/i.test(lower)) return `<div class="media-preview"><h4>🖼️ ${esc(name)}</h4><img class="media-player" src="${esc(src || content)}" style="max-height:42vh; object-fit:contain; padding:10px;"/><div class="media-actions"><a href="${esc(src || content)}" target="_blank" download="${esc(name)}">Download</a></div></div>`;
      if (content.startsWith('data:video/') || /\.(mp4|webm|mov|mkv)$/i.test(lower)) return `<div class="media-preview"><h4>🎥 ${esc(name)}</h4><video class="media-player video" src="${esc(src || content)}" controls playsinline></video><div class="media-actions"><a href="${esc(src || content)}" target="_blank" download="${esc(name)}">Download</a></div></div>`;
      if (content.startsWith('data:audio/') || /\.(mp3|wav|ogg|m4a|flac)$/i.test(lower)) return `<div class="media-preview"><h4>🎵 ${esc(name)}</h4><audio class="media-player" src="${esc(src || content)}" controls style="padding:14px;"></audio><div class="media-actions"><a href="${esc(src || content)}" target="_blank" download="${esc(name)}">Download</a></div></div>`;
      return `<div class="media-preview"><h4>📄 ${esc(name)}</h4><pre style="margin:0; white-space:pre-wrap; font:12px/1.5 Ubuntu, Arial, sans-serif; color:#cbd5e1;">${esc(content || '(empty file)')}</pre></div>`;
    };
    const openFileTab = (f) => {
      if (!fileTabs.some(x => x.id === f.id)) fileTabs.push(f);
      activeTabId = f.id;
      viewEl.innerHTML = renderPreview(f);
      renderFileTabs();
    };

    const openFileDialog = (f = null) => {
      if (f) {
        activeFileId = f.id;
        nameIn.value = f.name;
        bodyIn.value = f.content || '';
      } else {
        activeFileId = null;
        nameIn.value = '';
        bodyIn.value = '';
      }
      dialogOverlay.style.display = 'flex';
    };

    const closeFileDialog = () => {
      dialogOverlay.style.display = 'none';
      activeFileId = null;
      nameIn.value = '';
      bodyIn.value = '';
    };

    document.getElementById('close-dialog-btn').onclick = closeFileDialog;

    const renderFs = () => {
      const fixedFolders = ['/Document', '/Music', '/Pictures', '/Video'];
      const customFolders = (Array.isArray(allFs) ? allFs : []).filter(f => f.is_folder).map(f => '/' + f.name.replace(/^\/+|\/+$/g, ''));
      const folders = [...new Set([...fixedFolders, ...customFolders])];
      list.innerHTML = '<div style="margin-bottom:12px; font-weight:bold; color:#89f5ff; font-size:12px; font-family:monospace;">Folders</div>';
      
      folders.forEach(path => {
        const folderName = path.replace('/', '📁 ');
        const btn = document.createElement('button');
        btn.textContent = folderName;
        btn.style.cssText = "width:100%; text-align:left; padding:8px; background:" + (currentFolderPath === path ? "var(--accent-glow)" : "rgba(255,255,255,0.03)") + "; border:1px solid " + (currentFolderPath === path ? "var(--accent)" : "rgba(255,255,255,0.1)") + "; border-radius:4px; color:#fff; cursor:pointer; margin-bottom:6px; font-size:11px;";
        btn.onclick = () => {
          currentFolderPath = path;
          renderFs();
        };
        list.appendChild(btn);
      });

      pathTitle.textContent = currentFolderPath.replace('/', '📁 ');

      grid.innerHTML = '';
      const safeFs = Array.isArray(allFs) ? allFs : [];
      const folderFiles = safeFs.filter(f => f.parent_path === currentFolderPath && !f.is_folder);
      
      folderFiles.forEach(f => {
        const item = document.createElement('div');
        item.className = 'file-grid-item';
        
        let fileIcon = '📄';
        if (f.name.endsWith('.md')) fileIcon = '📝';
        if (f.name.endsWith('.m3u')) fileIcon = '🎵';
        if (/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(f.name)) fileIcon = '🖼️';
        if (/\.(mp4|webm|mov|mkv)$/i.test(f.name)) fileIcon = '🎥';
        if (/\.(mp3|wav|ogg|m4a|flac)$/i.test(f.name)) fileIcon = '🎵';
        
        item.innerHTML = `
          <div style="font-size:32px; margin-bottom:8px;">${fileIcon}</div>
          <div style="font-size:11px; word-break:break-all; max-height:30px; overflow:hidden;">${f.name}</div>
        `;
        item.onclick = () => {
          soundEngine.play('click');
          openFileTab(f);
        };
        grid.appendChild(item);
      });
    };

    const loadFiles = () => {
      return fetch(parentApi + '/api/files')
        .then(r => r.json())
        .then(data => {
          allFs = data;
          renderFs();
          return allFs;
        });
    };

    window.antaFolder = {
      openFolder(path) {
        currentFolderPath = path.startsWith('/') ? path : '/' + path;
        renderFs();
      },
      openFile(name) {
        const q = name.toLowerCase();
        const f = allFs.find(x => !x.is_folder && x.name.toLowerCase().includes(q));
        if (!f) return false;
        currentFolderPath = f.parent_path || currentFolderPath;
        renderFs();
        openFileTab(f);
        return true;
      },
      list() {
        return allFs.filter(f => f.parent_path === currentFolderPath && !f.is_folder).map(f => f.name).join(', ') || 'Folder kosong';
      },
      saveFile(name, content) {
        const old = allFs.find(x => !x.is_folder && x.parent_path === currentFolderPath && x.name.toLowerCase() === name.toLowerCase());
        return fetch(parentApi + '/api/files', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: old?.id || null, name, content, parent_path: currentFolderPath, is_folder: false })
        }).then(r => r.json()).then(saved => loadFiles().then(() => openFileTab(saved)));
      },
      deleteFile(name) {
        const f = allFs.find(x => !x.is_folder && x.name.toLowerCase().includes(name.toLowerCase()));
        if (!f) return Promise.resolve(false);
        return fetch(parentApi + '/api/files/' + f.id, { method: 'DELETE' }).then(() => loadFiles()).then(() => true);
      },
      saveFolder(name) {
        name = name.replace(/^\/+|\/+$/g, '');
        const old = allFs.find(x => x.is_folder && x.name.toLowerCase() === name.toLowerCase());
        return fetch(parentApi + '/api/files', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: old?.id || null, name, content: '', parent_path: '/', is_folder: true })
        }).then(() => loadFiles());
      },
      deleteFolder(name) {
        name = name.replace(/^\/+|\/+$/g, '');
        const f = allFs.find(x => x.is_folder && x.name.toLowerCase() === name.toLowerCase());
        if (!f) return Promise.resolve(false);
        return fetch(parentApi + '/api/files/' + f.id, { method: 'DELETE' }).then(() => loadFiles()).then(() => true);
      }
    };

    document.getElementById('add-file-btn').onclick = () => {
      soundEngine.play('click');
      openFileDialog();
    };

    document.getElementById('edit-file-btn').onclick = () => {
      const f = fileTabs.find(x => x.id === activeTabId);
      if (!f) return alert('Select a file tab first');
      openFileDialog(f);
    };

    document.getElementById('save-file-btn').onclick = () => {
      if (!nameIn.value.trim()) return alert('File Name is required');
      soundEngine.play('click');
      fetch(parentApi + '/api/files', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: activeFileId, name: nameIn.value, content: bodyIn.value, parent_path: currentFolderPath, is_folder: false })
      }).then(r => r.json()).then(saved => {
        fileTabs = fileTabs.filter(f => f.id !== saved.id);
        openFileTab(saved);
        closeFileDialog();
        loadFiles();
      });
    };

    document.getElementById('delete-file-btn').onclick = () => {
      if (!activeFileId) return alert('Select a file to delete');
      soundEngine.play('click');
      fetch(parentApi + '/api/files/' + activeFileId, { method: 'DELETE' })
        .then(() => {
          fileTabs = fileTabs.filter(f => f.id !== activeFileId);
          activeTabId = null;
          viewEl.textContent = 'Select a file to preview.';
          renderFileTabs();
          closeFileDialog();
          loadFiles();
        });
    };

    // --- DRAG AND DROP FILE UPLOAD IMPLEMENTATION ---
    const dropArea = grid;
    
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
      }, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => {
        dropArea.style.borderColor = 'var(--accent)';
        dropArea.style.background = 'rgba(137,245,255,0.05)';
      }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => {
        dropArea.style.borderColor = 'transparent';
        dropArea.style.background = 'transparent';
      }, false);
    });

    dropArea.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      if (files && files[0]) {
        const file = files[0];
        const reader = new FileReader();
        
        // Keep media playable by storing it as data URL.
        const isMedia = file.type.startsWith('image/') || file.type.startsWith('audio/') || file.type.startsWith('video/');
        
        reader.onload = function(event) {
          const content = event.target.result;
          soundEngine.play('click');
          fetch(parentApi + '/api/files', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: file.name,
              content: content,
              parent_path: currentFolderPath,
              is_folder: false
            })
          }).then(() => {
            alert('File "' + file.name + '" uploaded successfully.');
            loadFiles();
          });
        };

        if (isMedia) {
          reader.readAsDataURL(file);
        } else {
          reader.readAsText(file);
        }
      }
    });

    loadFiles();
  }

            <label>Icon URL:</label>
            <input id="new-card-icon" placeholder="Image link (png, svg)..." style="padding:8px; background:#0b1020; border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:#fff;" />
            <label>Description:</label>
            <textarea id="new-card-desc" placeholder="Card description..." style="padding:8px; background:#0b1020; border:1px solid rgba(255,255,255,0.1); border-radius:6px; color:#fff; height:80px; resize:none; font-family:inherit;"></textarea>
          </div>
          <button id="save-custom-card-btn" style="width:100%; padding:12px; background:#89f5ff; border:0; border-radius:6px; color:#000; font-weight:bold; cursor:pointer; margin-top:12px;">+ Save Device Card</button>
        </div>`;
    }
    
    holopanelContainer.innerHTML = `
      <div class="holopanel-header" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
        <h2 data-flip-id="id-${index}">${node.name} &mdash; ${node.category}</h2>
        <div style="display:flex; gap:12px; align-items:center;">
          <button id="holopanel-min-inner" style="background:none; border:0; color:#9aa8c7; font-size:24px; cursor:pointer; padding:4px 8px; line-height:1;">&minus;</button>
          <button id="holopanel-max-inner" style="background:none; border:0; color:#9aa8c7; font-size:18px; cursor:pointer; padding:4px 8px; line-height:1;">&#9633;</button>
          <button id="holopanel-close-inner" style="background:none; border:0; color:#9aa8c7; font-size:24px; cursor:pointer; padding:4px 8px; line-height:1;">&times;</button>
        </div>
      </div>
      <div class="holopanel-body" style="height: calc(100% - 60px); overflow: hidden;">
        ${bodyHtml}
      </div>`;
    
    const state = Flip.getState([card, backdrop, card.querySelector('.card-content')]);
    holopanel.classList.add('is-open'); scene.classList.add('is-panel-open'); card.classList.add('card-fader');
    
    Flip.from(state, {
      duration: 0.6, ease: 'power2.inOut', absolute: true,
      onComplete: () => {
        if (node.id === 'notepad') initNotepad();
        if (node.id === 'folder') initFolder();
        if (node.id === 'music') initSpotify();
        if (node.id === 'video') initVideo();
        if (node.id === 'google') initGoogle();
        if (node.id.startsWith('plus')) initPlus(index);
      }
    });

    document.getElementById('holopanel-close-inner').addEventListener('click', () => closePanel(index));
    
    // Add Minimize / Maximize toggle logic
    document.getElementById('holopanel-min-inner').onclick = () => {
      soundEngine.play('click');
      const container = document.getElementById('holopanel-container');
      const parent = document.getElementById('holopanel');
      container.classList.toggle('is-minimized');
      parent.classList.toggle('is-minimized-parent');
      container.classList.remove('is-maximized');
      updateInfoToggle();
    };

    document.getElementById('holopanel-max-inner').onclick = () => {
      soundEngine.play('click');
      const container = document.getElementById('holopanel-container');
      container.classList.toggle('is-maximized');
      container.classList.remove('is-minimized');
      updateInfoToggle();
    };
  }
  function closePanel(index) {
    if (!isPanelOpen) return;
    isPanelOpen = false;
    if (activeModalAnimations) activeModalAnimations.kill();
    gsap.killTweensOf('.mastery-ring-fg'); // Detener animación de respiración
    
    const card = cards[index];
    const state = Flip.getState([holopanelContainer, backdrop], { props: "opacity, transform" });
    holopanel.classList.remove('is-open');
    Flip.to(state, {
      duration: 0.4, ease: 'power2.in', scale: true,
      onComplete: () => {
        holopanelContainer.innerHTML = '';
        scene.classList.remove('is-panel-open');
        card.classList.remove('card-fader');
        updateInfoToggle();
      }
    });
  }

  function updateStats() {
    const totalSkills = nodes.length;
    const totalProjects = nodes.reduce((sum, n) => sum + n.projects, 0);
    const totalCommits = nodes.reduce((sum, n) => sum + n.commits, 0);
    const avgLevel = Math.round(nodes.reduce((sum, n) => sum + n.level, 0) / totalSkills);

    // MEJORA: Animar KPIs al abrir el panel de estadísticas
    gsap.to('#total-skills', { textContent: totalSkills, duration: 1, roundProps: 'textContent' });
    gsap.to('#total-projects', { textContent: totalProjects, duration: 1, roundProps: 'textContent' });
    gsap.to('#total-commits', { textContent: totalCommits, duration: 1, roundProps: 'textContent' });
    gsap.to('#avg-level', { innerHTML: avgLevel, duration: 1, roundProps: 'innerHTML', onUpdate: function() { this.targets()[0].innerHTML += '%'; } });

    const categories = {}, levels = { '90+': 0, '80-89': 0, '70-79': 0, '<70': 0 };
    nodes.forEach(node => {
      categories[node.category] = (categories[node.category] || 0) + 1;
      if (node.level >= 90) levels['90+']++; else if (node.level >= 80) levels['80-89']++;
      else if (node.level >= 70) levels['70-79']++; else levels['<70']++;
    });

    document.getElementById('category-chart').innerHTML = Object.entries(categories).map(([cat, count]) => `<div class="chart-bar" style="height: 0%;" data-height="${(count / totalSkills) * 100}" data-label="${cat}"></div>`).join('');
    document.getElementById('level-chart').innerHTML = Object.entries(levels).map(([range, count]) => `<div class="chart-bar" style="height: 0%;" data-height="${(count / totalSkills) * 100}" data-label="${range}"></div>`).join('');

    gsap.to('.chart-bar', { height: (i, el) => `${el.dataset.height}%`, duration: 0.8, stagger: 0.05, ease: 'power2.out' });
  }

  function toggleStats() {
    isStatsOpen = !isStatsOpen;
    statsPanel.classList.toggle('is-open', isStatsOpen);
    if (isStatsOpen) { updateStats(); soundEngine.play('open'); } 
    else { soundEngine.play('click'); }
    updateInfoToggle();
  }

  function say(text) {
    voiceCommand.textContent = text;
    voiceCommand.classList.add('is-active');
    clearTimeout(window.antaVoiceTimer);
    window.antaVoiceTimer = setTimeout(() => voiceCommand.classList.remove('is-active'), 3500);
  }

  function ensureFolderPanel(done) {
    const idx = nodes.findIndex(n => n.id === 'folder');
    if (idx < 0) return;
    if (!isPanelOpen || active !== idx) {
      window.antaFolder = null;
      if (isPanelOpen) closePanel(active);
      setActive(idx);
      setTimeout(() => openPanel(idx), 450);
    }
    const wait = () => window.antaFolder ? done(window.antaFolder) : setTimeout(wait, 120);
    wait();
  }

  function runAntaCommand(raw) {
    const text = raw.toLowerCase().trim();
    say('Perintah: ' + raw);
    if (/(tutup|close|keluar|kembali).*(menu|awal|orb|depan)|^(tutup|close) menu$|^kembali ke depan$/.test(text)) {
      say('Baik, kembali ke depan.');
      setTimeout(() => {
        let closed = false;
        window.addEventListener('message', e => { if (e.data?.type === 'anta-menu-closed') closed = true; }, { once: true });
        window.top.postMessage({ type: 'anta-close-menu' }, '*');
        setTimeout(() => { if (!closed) window.top.location.href = '/'; }, 250);
      }, 500);
      return;
    }
    const cardNames = { folder: 'folder', berkas: 'folder', file: 'folder', notepad: 'notepad', catatan: 'notepad', spotify: 'music', musik: 'music', music: 'music', youtube: 'video', video: 'video', google: 'google' };
    const cardKey = Object.keys(cardNames).find(k => new RegExp('\\b(buka|open)\\b.*\\b' + k + '\\b|\\b' + k + '\\b.*\\b(buka|open)\\b').test(text));
    if (cardKey) {
      const idx = nodes.findIndex(n => n.id === cardNames[cardKey]);
      if (idx >= 0) {
        if (isPanelOpen) closePanel(active);
        setActive(idx);
        setTimeout(() => openPanel(idx), 350);
        return say('Saya buka ' + nodes[idx].name + '.');
      }
    }
    const folderMap = { dokumen: '/Document', document: '/Document', musik: '/Music', music: '/Music', gambar: '/Pictures', picture: '/Pictures', pictures: '/Pictures', video: '/Video' };
    ensureFolderPanel(api => {
      let m;
      if (m = text.match(/(?:buka|open) folder ([\w-]+)/)) {
        api.openFolder(folderMap[m[1]] || '/' + m[1]);
        return say('Folder dibuka: ' + (folderMap[m[1]] || '/' + m[1]));
      }
      if (m = text.match(/(?:buat|create) folder ([\w-]+)/)) {
        return api.saveFolder(m[1]).then(() => say('Folder dibuat: ' + m[1]));
      }
      if (m = text.match(/(?:hapus|delete) folder ([\w-]+)/)) {
        return api.deleteFolder(m[1]).then(ok => say(ok ? 'Folder dihapus' : 'Folder tidak ditemukan'));
      }
      if (m = text.match(/(?:buka|open|lihat|read) file (.+)$/)) {
        return say(api.openFile(m[1].trim()) ? 'File dibuka' : 'File tidak ditemukan');
      }
      if (m = text.match(/(?:buat|create) file ([^\s]+)(?: isi| content)? (.+)$/)) {
        return api.saveFile(m[1], m[2]).then(() => say('File dibuat: ' + m[1]));
      }
      if (m = text.match(/(?:ubah|update|edit) file ([^\s]+)(?: isi| content)? (.+)$/)) {
        return api.saveFile(m[1], m[2]).then(() => say('File diubah: ' + m[1]));
      }
      if (m = text.match(/(?:hapus|delete) file (.+)$/)) {
        return api.deleteFile(m[1].trim()).then(ok => say(ok ? 'File dihapus' : 'File tidak ditemukan'));
      }
      if (text.includes('list') || text.includes('daftar')) return say('File: ' + api.list());
      if (text.includes('tutup') || text.includes('close')) { if (isPanelOpen) closePanel(active); return say('Ditutup'); }
      say('Contoh: buka folder dokumen, buat file test.txt isi halo, buka file test.txt, hapus file test.txt');
    });
  }

  function toggleVoiceCommands() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return say('Browser belum mendukung voice input');
    const orb = document.getElementById('anta-orb');
    const rec = new SR();
    rec.lang = 'id-ID';
    rec.interimResults = false;
    rec.onstart = () => { orb.classList.add('listening'); say('Mendengar...'); };
    rec.onend = () => orb.classList.remove('listening');
    rec.onerror = e => say('Mic gagal: ' + (e.error || 'izin ditolak'));
    rec.onresult = e => runAntaCommand(e.results[0][0].transcript);
    try { rec.start(); } catch { say('Mic belum siap'); }
  }

  // --- Event Listeners ---
  document.getElementById('next').addEventListener('click', () => { soundEngine.play('click'); setActive(active + 1); });
  document.getElementById('prev').addEventListener('click', () => { soundEngine.play('click'); setActive(active - 1); });
  document.getElementById('mute').addEventListener('click', () => soundEngine.toggleMute());
  backdrop.addEventListener('click', () => closePanel(active));
  document.getElementById('stats-toggle').addEventListener('click', toggleStats);
  document.getElementById('stats-close').addEventListener('click', toggleStats);
  const antaOrbBtn = document.getElementById('anta-orb-btn');
  antaOrbBtn.addEventListener('pointerdown', e => { e.stopPropagation(); wasDragged = false; });
  antaOrbBtn.addEventListener('click', e => { e.stopPropagation(); toggleVoiceCommands(); });

  window.addEventListener('resize', updateInfoToggle);

  window.addEventListener('keydown', (e) => {
    if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
    if (isPanelOpen) { if (e.key === 'Escape') closePanel(active); return; }
    if (isStatsOpen) { if (e.key === 'Escape') toggleStats(); return; }
    
    if (e.code === 'ArrowRight' && !document.getElementById('next').disabled) setActive(active + 1);
    if (e.code === 'ArrowLeft' && !document.getElementById('prev').disabled) setActive(active - 1);
    if (e.key === 'Enter') openPanel(active);
    if (e.key.toLowerCase() === 'v') toggleVoiceCommands();
    if (e.key.toLowerCase() === 's') toggleStats();
  });
  
  let touchStartX = 0;
  let isDragging = false;

  window.addEventListener('mousedown', (e) => {
    if (e.target.closest?.('#anta-orb')) return;
    if (isPanelOpen) return;
    touchStartX = e.clientX;
    wasDragged = false;
  });

  window.addEventListener('mouseup', (e) => {
    if (isPanelOpen) return;
    const diff = e.clientX - touchStartX;
    if (Math.abs(diff) > 40) {
      wasDragged = true;
      if (diff < 0) {
        if (active < nodes.length - 1) {
          soundEngine.play('click');
          setActive(active + 1);
        }
      } else {
        if (active > 0) {
          soundEngine.play('click');
          setActive(active - 1);
        }
      }
      setTimeout(() => { wasDragged = false; }, 50);
    }
  });

  window.addEventListener('touchstart', (e) => {
    if (e.target.closest?.('#anta-orb')) return;
    if (isPanelOpen || !e.touches[0]) return;
    touchStartX = e.touches[0].clientX;
    wasDragged = false;
  }, { passive: true });

  window.addEventListener('touchend', (e) => {
    if (isPanelOpen || !e.changedTouches[0]) return;
    const diff = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(diff) > 30) {
      wasDragged = true;
      if (diff < 0) {
        if (active < nodes.length - 1) {
          soundEngine.play('click');
          setActive(active + 1);
        }
      } else {
        if (active > 0) {
          soundEngine.play('click');
          setActive(active - 1);
        }
      }
      setTimeout(() => { wasDragged = false; }, 50);
    }
  }, { passive: true });

  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5); mouseY = (e.clientY / window.innerHeight - 0.5);
  }, { passive: true });

  gsap.ticker.add(() => {
    if (!isPanelOpen) {
      gsap.to(scene, { rotationX: 25 + mouseY * 10, rotationY: -20 + mouseX * 15, duration: 1, ease: 'power1.out' });
    }
  });
  
  // --- Inicialización ---
  setActive(0, true);
  console.log('🚀 Portfolio HUD v3 Advanced Loaded');
  console.log('✨ Features: Themed Cards, Magnetic Tilt, Energy Orbits, Spectral Bloom, Sparklines, Animated Stats & Modals, Voice Commands.');
})();
</script>
</body>
</html>
